<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Test AI Employee</title>

    <link rel="stylesheet" href="test-chat.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <header>

        <h1>🤖 AI Customer Support Employee</h1>

        <p>Status <span class="online">● Online</span></p>

    </header>

    <main class="chat-box">

        <div class="message ai">

            <p>
                👋 Hi! I'm your AI Customer Support Employee.
                Ask me anything about your business.
            </p>

        </div>

        <div class="message user">

            <p>
                What is your refund policy?
            </p>

        </div>

        <div class="message ai">

            <p>
                We provide a 30-day refund policy for eligible purchases.
            </p>

        </div>

    </main>

    <div class="input-area">

        <input
            type="text"
            placeholder="Type your message..."
        >

        <button>

            Send

        </button>

    </div>

</div>

</body>

</html>
